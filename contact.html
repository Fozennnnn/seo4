</head>

        <a href="index.html" class="logo">
            <img src="images/brand_logo.png" alt="Vanguard Logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">首頁</a></li>
                <li><a href="about.html">公司簡介</a></li>
                <li><a href="casual.html">休閒服飾</a></li>

                <li><a href="contact.html">聯絡我們</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" style="padding: 100px 20px;">
        <h1 class="section-title">聯絡我們</h1>
        
        <div class="contact-form">
            <div style="text-align: center; margin-bottom: 30px;">
                <p style="margin-bottom: 10px;">有任何問題或建議？請隨時與我們聯繫。</p>
                <a href="#" class="btn" style="background-color: #00B900; color: white; border-color: #00B900; margin-bottom: 20px;">加入 LINE 官方群組</a>
            </div>

            <form onsubmit="alert('訊息已送出，我們將盡快回覆您！'); return false;">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">訊息</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">送出訊息</button>
            </form>
        </div>
    </div>

    <footer style="margin-top: 50px;">
        <p>&copy; 2026 VANGUARD. All rights reserved.</p>
    </footer>
